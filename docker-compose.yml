services:
  plex-to-trakt:
    build: .
    container_name: plex-to-trakt
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      # Database
      - DATABASE_URL=file:/app/data/data.db
      # External URL for reverse proxy setups
      - EXTERNAL_URL=${EXTERNAL_URL:-http://localhost:3000}
      # Plex Configuration
      - PLEX_CLIENT_ID=${PLEX_CLIENT_ID}
      - PLEX_SERVER_ID=${PLEX_SERVER_ID}
      - PLEX_SERVER_IP=${PLEX_SERVER_IP}
      # Session Secret
      - SESSION_SECRET=${SESSION_SECRET}
      # Plex server connection: seek correction + full library sync (see README)
      - PLEX_SERVER_URL=${PLEX_SERVER_URL:-}
      - PLEX_TOKEN=${PLEX_TOKEN:-}
      # Full library sync interval: 3h, 6h, 12h, 24h, or off
      - SYNC_INTERVAL=${SYNC_INTERVAL:-}
      # Bidirectional unwatched sync (true/false)
      - SYNC_UNWATCHED=${SYNC_UNWATCHED:-false}
      # Watch-state quick poller interval in seconds (e.g., 60)
      - WATCH_POLL_INTERVAL=${WATCH_POLL_INTERVAL:-}
